name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-test:
    name: Build & Test (MosaicCore)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          set -euo pipefail
          swift build -v

      - name: Test
        run: |
          set -euo pipefail
          swift test -v

  build-app:
    name: Build App (iOS Simulator)
    # macos-15 ships Xcode 16, which can open the project format XcodeGen emits
    # (objectVersion 77). Xcode 15.4 on macos-14 cannot.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: App
        run: xcodegen generate

      # Builds without CocoaPods on purpose: the MediaPipe glue is gated on
      # `canImport(MediaPipeTasksVision)`, so the app compiles pod-free. This
      # keeps the job fast and network-independent while still verifying the
      # app target, the SwiftUI views, and the Metal shader compilation.
      - name: Build app for simulator
        run: |
          set -euo pipefail
          xcodebuild build \
            -project App/MaskMe.xcodeproj \
            -scheme MaskMe \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
