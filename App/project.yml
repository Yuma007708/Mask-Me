name: MaskMe
options:
  bundleIdPrefix: com.maskme
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  MosaicCore:
    # The MediaPipe-free core lives one directory up as a SwiftPM package.
    path: ../

targets:
  MaskMe:
    type: application
    platform: iOS
    sources:
      - path: MaskMe
    dependencies:
      - package: MosaicCore
        product: MosaicCore
    settings:
      base:
        INFOPLIST_FILE: MaskMe/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maskme.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: MaskMe/Info.plist
    # Generates a shared "MaskMe" scheme so `xcodebuild -scheme MaskMe`
    # (and SwiftPM package resolution) works in CI. The detection-accuracy
    # tests run under this scheme (`xcodebuild test` / Cmd+U).
    scheme:
      testTargets:
        - MaskMeTests

  # Unit-test target for real-image face-detection accuracy. Requires the
  # MediaPipe pod + face_landmarker.task model + fixture images, so it runs on a
  # Simulator / device — not in the pod-free CI build. See App/MaskMeTests/Fixtures.
  MaskMeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MaskMeTests
        excludes:
          - "Fixtures/**"
      # Bundle Fixtures as a folder reference so the faces/ and nonfaces/
      # subdirectories survive into the test bundle (FixtureLoader looks them up
      # with `subdirectory:`).
      - path: MaskMeTests/Fixtures
        type: folder
    dependencies:
      - target: MaskMe
      - package: MosaicCore
        product: MosaicCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maskme.app.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MaskMe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MaskMe"
        BUNDLE_LOADER: "$(TEST_HOST)"
